name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'jazz/Dockerfile'
      - 'jazz/getItBuildItRunIt.sh'
      - 'jazz/templates/**'
      - 'jazz/jazz_limits.conf'
      - 'oracle/**'
      - '.env'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'jazz/Dockerfile'
      - 'jazz/getItBuildItRunIt.sh'
      - 'jazz/templates/**'
      - 'jazz/jazz_limits.conf'
      - 'oracle/**'
      - '.env'

jobs:
  validate:
    name: Validate Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  build-jazz:
    name: Build Jazz ELM Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Login to Oracle Container Registry
        uses: docker/login-action@v3
        with:
          registry: container-registry.oracle.com
          username: ${{ secrets.ORACLE_REGISTRY_USER }}
          password: ${{ secrets.ORACLE_REGISTRY_PASSWORD }}

      - name: Build Jazz CLM image
        run: docker compose build jazz_clm
        timeout-minutes: 60

      - name: Pull Oracle 19c image
        run: docker compose pull jazz_oracle
        timeout-minutes: 10

      - name: Verify images
        run: docker images
